<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой профиль | Соцсети</title>
    <!-- Font Awesome для красивых иконок (бесплатная библиотека) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            padding: 40px 30px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            transition: transform 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .card:hover {
            transform: translateY(-10px);
        }

        /* Фотография профиля */
        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
            transition: transform 0.3s;
            background: #f0f0f0; /* если фото не загрузится */
        }

        .profile-img:hover {
            transform: scale(1.05);
        }

        /* Никнейм */
        .username {
            font-size: 2.2em;
            font-weight: 700;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        /* Описание (можно добавить) */
        .bio {
            color: #555;
            margin-bottom: 30px;
            font-size: 1.1em;
            border-bottom: 2px dashed #ddd;
            padding-bottom: 20px;
        }

        /* Сетка с иконками */
        .social-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .social-item {
            flex: 0 0 auto;
        }

        /* Стили для каждой соцсети */
        .social-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #333;
            transition: all 0.3s;
            width: 90px;
            padding: 15px 5px;
            border-radius: 20px;
            background: white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .social-link:hover {
            transform: scale(1.1);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        /* Цвета при наведении для каждой платформы */
        .social-link.boosty:hover {
            background: #f57d00;
            color: white;
        }
        .social-link.boosty:hover i {
            color: white;
        }

        .social-link.youtube:hover {
            background: #ff0000;
            color: white;
        }
        .social-link.youtube:hover i {
            color: white;
        }

        .social-link.tiktok:hover {
            background: #000000;
            color: white;
        }
        .social-link.tiktok:hover i {
            color: white;
        }

        .social-link.telegram:hover {
            background: #0088cc;
            color: white;
        }
        .social-link.telegram:hover i {
            color: white;
        }

        /* Иконки */
        .social-link i {
            font-size: 2.5em;
            margin-bottom: 8px;
            transition: color 0.3s;
        }

        /* Цвета иконок по умолчанию */
        .boosty i {
            color: #f57d00;
        }
        .youtube i {
            color: #ff0000;
        }
        .tiktok i {
            color: #000000;
        }
        .telegram i {
            color: #0088cc;
        }

        /* Текст под иконкой */
        .social-link span {
            font-weight: 600;
            font-size: 0.9em;
        }

        /* Если хотите добавить подпись под фото */
        .caption {
            margin-top: 15px;
            color: #888;
            font-size: 0.9em;
        }

        /* Адаптация для маленьких экранов */
        @media (max-width: 450px) {
            .card {
                padding: 30px 15px;
            }
            .username {
                font-size: 1.8em;
            }
            .social-link {
                width: 70px;
                padding: 12px 3px;
            }
            .social-link i {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- ФОТОГРАФИЯ: замените URL на ваше изображение -->
        <img src="https://via.placeholder.com/300x300/667eea/ffffff?text=Моё+фото" 
             alt="Моя фотография" 
             class="profile-img"
             id="profilePhoto">
        
        <!-- НИКНЕЙМ: измените на ваш -->
        <h1 class="username">@your_nickname</h1>
        
        <!-- Небольшое описание (по желанию) -->
        <div class="bio">
            🚀 Создатель контента | Блогер
        </div>

        <!-- КОНТЕЙНЕР С ИКОНКАМИ СОЦСЕТЕЙ -->
        <div class="social-grid">
            <!-- Boosty (замените ссылку) -->
            <div class="social-item">
                <a href="https://boosty.to/your_page" target="_blank" class="social-link boosty">
                    <i class="fas fa-rocket"></i> <!-- можно использовать fa-bolt, fa-star и т.д. -->
                    <span>Boosty</span>
                </a>
            </div>

            <!-- YouTube (замените ссылку) -->
            <div class="social-item">
                <a href="https://youtube.com/c/your_channel" target="_blank" class="social-link youtube">
                    <i class="fab fa-youtube"></i>
                    <span>YouTube</span>
                </a>
            </div>

            <!-- TikTok (замените ссылку) -->
            <div class="social-item">
                <a href="https://tiktok.com/@your_nickname" target="_blank" class="social-link tiktok">
                    <i class="fab fa-tiktok"></i>
                    <span>TikTok</span>
                </a>
            </div>

            <!-- Telegram (замените ссылку) -->
            <div class="social-item">
                <a href="https://t.me/your_nickname" target="_blank" class="social-link telegram">
                    <i class="fab fa-telegram-plane"></i>
                    <span>Telegram</span>
                </a>
            </div>
        </div>

        <!-- Дополнительная информация (необязательно) -->
        <div class="caption">
            👆 Нажми на иконку, чтобы перейти
        </div>
    </div>

    <!-- Небольшой скрипт для обработки ошибки загрузки фото -->
    <script>
        // Если изображение не загрузится (например, удалённое), показывается заглушка с инициалами
        const profileImg = document.getElementById('profilePhoto');
        profileImg.onerror = function() {
            this.src = 'https://via.placeholder.com/300x300/cccccc/666666?text=Фото'; // заглушка
        };
        
        // Пример как можно изменить ник через JS, если нужно динамически (сейчас статика)
        // document.querySelector('.username').textContent = '@new_nickname';
    </script>
</body>
</html>
